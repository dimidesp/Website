<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>otherform — Industrial Design</title>
    
    <!-- Font imports -->
    <link href="https://cdn.jsdelivr.net/npm/fontsource-inter@5.1.3/300.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fontsource-inter@5.1.3/400.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/fontsource-inter@5.1.3/600.css" rel="stylesheet">
    
    <!-- Link to external CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="custom-cursor" id="customCursor"></div>
    <div class="cursor-glow-trail" id="cursorGlowTrail"></div>

    <nav>
        <div class="nav-brand" onclick="navigateTo('work')">otherform</div>
        <div class="nav-links">
            <button class="nav-link active" id="nav-work" onclick="navigateTo('work')">Work</button>
            <button class="nav-link" id="nav-about" onclick="navigateTo('about')">About</button>
        </div>
    </nav>

    <div class="page active" id="page-work">
        <div class="work-brand">
            <h1>otherform</h1>
        </div>
        <div class="slideshow-container" id="slideshowContainer"></div>
        
        <div class="slide-counter">
            <span class="current-num" id="counterCurrent">01</span>
            <span> / </span>
            <span id="counterTotal">05</span>
        </div>
        
        <div class="pause-indicator" id="pauseBtn" onclick="togglePause()">
            <span class="pause-dot" id="pauseDot"></span>
            <span id="pauseLabel">PAUSE</span>
        </div>
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="page" id="page-about">
        <div class="about-content">
            <h2>About</h2>
            <div class="about-divider"></div>
            <p class="about-placeholder">
                otherform is an industrial design studio exploring the space between function and form. 
                We craft objects that challenge conventions — where geometry meets emotion, 
                and precision meets intuition.
            </p>
            <p class="about-tagline">Something is coming.</p>
        </div>
    </div>

    <script>
        // ⚠️ IMPORTANT: Replace these URLs with relative paths to YOUR images
        // Example: "./images/01.jpg" instead of "file:///E:/..."
        const IMAGE_URLS = [
            "./images/01.jpg",
            "./images/02.png",
            "./images/03.png",
            "./images/04.jpg",
            "./images/05.png"
        ];

        const TOTAL_SLIDES = IMAGE_URLS.length;
        const POP_INTERVAL = 800;
        const OUTRO_DURATION = 1800;
        const LOOP_DELAY = 1500;

        let currentSlide = 0;
        let isPaused = false;
        let slideshowTimer = null;

        const slides = [];
        const offsets = [];

        function generateOffsets() {
            for (let i = 0; i < TOTAL_SLIDES; i++) {
                offsets.push({
                    x: (Math.random() - 0.5) * 120,
                    y: (Math.random() - 0.5) * 100,
                    rot: 0
                });
            }
        }

        function buildSlides() {
            const container = document.getElementById('slideshowContainer');
            generateOffsets();

            IMAGE_URLS.forEach((url, idx) => {
                const img = document.createElement('img');
                img.className = 'slide-image';
                img.id = 'slide-' + idx;
                img.src = url;
                img.alt = 'otherform teaser ' + (idx + 1);
                
                img.style.setProperty('--offX', offsets[idx].x + 'px');
                img.style.setProperty('--offY', offsets[idx].y + 'px');
                
                container.appendChild(img);
                slides.push(img);
            });

            document.getElementById('counterTotal').textContent = String(TOTAL_SLIDES).padStart(2, '0');
        }

        function popSlide() {
            if (isPaused) return;
            if (currentSlide >= TOTAL_SLIDES) {
                startSoftOutro();
                return;
            }

            const slide = slides[currentSlide];
            slide.style.zIndex = currentSlide + 1;

            slide.classList.remove('pop-in', 'soft-fade-out');
            void slide.offsetWidth;
            slide.classList.add('pop-in');

            updateCounter(currentSlide + 1);
            currentSlide++;

            slideshowTimer = setTimeout(popSlide, POP_INTERVAL);
        }

        function startSoftOutro() {
            slides.forEach((slide) => {
                slide.classList.remove('pop-in');
                void slide.offsetWidth;
                slide.classList.add('soft-fade-out');
            });

            setTimeout(() => {
                slides.forEach(slide => {
                    slide.classList.remove('soft-fade-out');
                    slide.style.opacity = '0';
                });
                currentSlide = 0;
                updateCounter(0);

                setTimeout(() => {
                    if (!isPaused) startSlideshow();
                }, LOOP_DELAY);
            }, OUTRO_DURATION);
        }

        function startSlideshow() {
            currentSlide = 0;
            popSlide();
        }

        function updateCounter(num) {
            const counter = document.getElementById('counterCurrent');
            counter.textContent = String(num).padStart(2, '0');
        }

        function togglePause() {
            isPaused = !isPaused;
            const dot = document.getElementById('pauseDot');
            const label = document.getElementById('pauseLabel');

            if (isPaused) {
                dot.classList.add('paused');
                label.textContent = 'RESUME';
                clearTimeout(slideshowTimer);
            } else {
                dot.classList.remove('paused');
                label.textContent = 'PAUSE';
                startSlideshow();
            }
        }

        function navigateTo(page) {
            const workPage = document.getElementById('page-work');
            const aboutPage = document.getElementById('page-about');
            const navWork = document.getElementById('nav-work');
            const navAbout = document.getElementById('nav-about');

            if (page === 'work') {
                workPage.classList.add('active');
                aboutPage.classList.remove('active');
                navWork.classList.add('active');
                navAbout.classList.remove('active');
                if (currentSlide === 0 && slides[0] && slides[0].style.opacity === '0') {
                    startSlideshow();
                }
            } else {
                workPage.classList.remove('active');
                aboutPage.classList.add('active');
                navAbout.classList.add('active');
                navWork.classList.remove('active');
                if (!isPaused) {
                    isPaused = true;
                    clearTimeout(slideshowTimer);
                    document.getElementById('pauseDot').classList.add('paused');
                    document.getElementById('pauseLabel').textContent = 'RESUME';
                }
            }
        }

        const cursor = document.getElementById('customCursor');
        const cursorTrail = document.getElementById('cursorGlowTrail');

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            cursorTrail.style.left = e.clientX + 'px';
            cursorTrail.style.top = e.clientY + 'px';
        });

        const interactiveElements = document.querySelectorAll('.nav-brand, .pause-indicator, .nav-link');
        interactiveElements.forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursor.style.width = '30px';
                cursor.style.height = '30px';
                cursor.style.background = 'rgba(255, 255, 255, 0.8)';
            });
            el.addEventListener('mouseleave', () => {
                cursor.style.width = '16px';
                cursor.style.height = '16px';
                cursor.style.background = '#ffffff';
            });
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                togglePause();
            }
        });

        buildSlides();
        startSlideshow();
    </script>
</body>
</html>
